spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.defaultCatalog=fairtiq
spark.sql.catalogImplementation=in-memory
spark.jars.packages=org.apache.spark:spark-avro_2.12:3.5.5,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262

spark.sql.catalog.fairtiq=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.fairtiq.type=rest
spark.sql.catalog.fairtiq.uri=http://rest:8181
spark.sql.catalog.fairtiq.warehouse=s3://warehouse/
spark.sql.catalog.fairtiq.io-impl=org.apache.iceberg.aws.s3.S3FileIO

spark.sql.catalog.fairtiq.s3.endpoint=http://minio:9000
spark.sql.catalog.fairtiq.s3.path-style-access=true
spark.sql.catalog.fairtiq.s3.access-key-id=admin
spark.sql.catalog.fairtiq.s3.secret-access-key=password
spark.sql.catalog.fairtiq.s3.region=us-east-1

spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.endpoint=http://minio:9000
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.access.key=admin
spark.hadoop.fs.s3a.secret.key=password
spark.hadoop.fs.s3a.connection.ssl.enabled=false

spark.hadoop.fs.s3.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3.endpoint=http://minio:9000
spark.hadoop.fs.s3.path.style.access=true
spark.hadoop.fs.s3.access.key=admin
spark.hadoop.fs.s3.secret.key=password
spark.hadoop.fs.s3.connection.ssl.enabled=false
