services:
  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    container_name: minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      MINIO_DOMAIN: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./warehouse:/data
    networks:
      iceberg_net:
        aliases:
          - warehouse.minio

  rest:
    image: apache/iceberg-rest-fixture:1.8.1
    container_name: iceberg-rest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH_STYLE_ACCESS: "true"
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/v1/config"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - iceberg_net

  spark:
    image: tabulario/spark-iceberg:3.5.5_1.8.1
    container_name: spark-iceberg
    depends_on:
      minio:
        condition: service_healthy
      rest:
        condition: service_healthy
      mc:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
    ports:
      - "8080:8080"
      - "10000:10000"
      - "10001:10001"
    volumes:
      - ./conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./sql:/opt/demo/sql:ro
    networks:
      - iceberg_net

  mc:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    container_name: mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set minio http://minio:9000 admin password; do
        echo 'waiting for minio...';
        sleep 1;
      done;
      if /usr/bin/mc ls minio/warehouse >/dev/null 2>&1; then
        /usr/bin/mc rb --force minio/warehouse;
      fi;
      /usr/bin/mc mb minio/warehouse;
      /usr/bin/mc policy set download minio/warehouse;
      tail -f /dev/null
      "
    networks:
      - iceberg_net

networks:
  iceberg_net:
